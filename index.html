<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Île Callot — horaires de marée et accessibilité"
    />
    <meta name="theme-color" content="#111113" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Callot" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>"
    />
    <link rel="manifest" href="./manifest.json" />
    <title>Callot</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <a href="/" class="title">callot <span></span></a>
      <div class="header-btns">
        <button
          id="bell-btn"
          aria-label="Activer les alertes"
          title="Activer les alertes"
        >
          <svg
            class="bell-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
        <button id="lang-btn" aria-label="Switch language">EN</button>
        <button id="theme-btn" aria-label="Changer le thème">
          <img
            id="theme-icon"
            class="icon"
            src="./icons/moon.svg"
            alt="thème"
          />
        </button>
      </div>
    </header>

    <main>
      <div id="clock">17:42<span id="clock-sec">:35</span></div>

      <div id="status-block">
        <div id="status-label">· · ·</div>
        <div id="status-sub"></div>
        <div id="status-tide"></div>
        <div id="status-weather" hidden></div>
      </div>

      <div id="timeline-wrap">
        <div id="timeline-tide-labels"></div>
        <div id="timeline">
          <div id="timeline-track"></div>
          <div id="timeline-windows"></div>
          <div id="timeline-tides"></div>
          <div id="timeline-ticks"></div>
          <div id="timeline-now"></div>
          <svg
            id="timeline-svg"
            viewBox="0 0 1000 100"
            preserveAspectRatio="none"
          ></svg>
        </div>
        <div id="timeline-tick-labels"></div>
        <div id="timeline-labels">
          <span>0h</span><span>6h</span><span>12h</span><span>18h</span
          ><span></span>
        </div>
      </div>

      <div id="upcoming">
        <div id="upcoming-label">fenêtres à venir</div>
        <div id="upcoming-rows"></div>
      </div>

      <div id="schedule">
        <div id="schedule-label">marées</div>
        <div id="schedule-date"></div>
        <div id="schedule-rows"></div>
      </div>

      <div id="calendar">
        <div id="calendar-label">semaine</div>
        <div id="calendar-rows"></div>
      </div>

      <div id="about">
        <div id="about-label">à propos</div>
        <p id="about-text"></p>
      </div>
    </main>

    <footer>
      <a
        href="https://github.com/cletqui/callot"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub"
      >
        <img class="icon footer-icon" src="./icons/github.svg" alt="GitHub" />
      </a>
      <a
        href="https://buymeacoffee.com/cletqui"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Buy me a coffee"
      >
        <img
          class="icon footer-icon"
          src="./icons/coffee.svg"
          alt="Buy me a coffee"
        />
      </a>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
